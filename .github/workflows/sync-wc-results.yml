name: Sync World Cup results

on:
  schedule:
    # Every 15 minutes during tournament (UTC). Adjust if needed.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync results from ESPN
        run: node scripts/sync-live-results.mjs --no-players

      - name: Sync player box scores from ESPN
        run: node scripts/sync-match-players.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/match-results.json src/data/espn-fixture-map.json data/group-*/*.json data/group-*/*-raw.json src/data/world-cup-players.json src/data/rosters-2025-26.json src/data/national-teams.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: sync World Cup match results from ESPN"
          git push
